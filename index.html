<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — PayTrack</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="login-wrapper">
    <div class="login-split fade-in">

      <div class="login-panel-left">
        <div class="lp-brand">
          <div class="lp-icon">💳</div>
          <h1>PayTrack</h1>
          <p>Online Payment Record<br>Management System</p>
        </div>

        <div class="lp-features">
          <div class="lp-feature">
            <div class="lp-feature-dot">➕</div>
            Add & track payment records
          </div>
          <div class="lp-feature">
            <div class="lp-feature-dot">✏️</div>
            Update payment statuses
          </div>
          <div class="lp-feature">
            <div class="lp-feature-dot">📋</div>
            Generate detailed reports
          </div>
          <div class="lp-feature">
            <div class="lp-feature-dot">📥</div>
            Export records to CSV
          </div>
        </div>
      </div>

      <div class="login-panel-right">
        <h2>Welcome back 👋</h2>
        <p>Sign in to your PayTrack account to continue.</p>

        <div class="login-error" id="loginError"></div>

        <form id="loginForm" autocomplete="off" novalidate>

          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Enter username" autocomplete="username" required />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <div style="position:relative;">
              <input
                type="password" id="password"
                placeholder="Enter password"
                style="padding-right:44px;" required
              />
              <button type="button" id="togglePassword" style="
                position:absolute; right:13px; top:50%; transform:translateY(-50%);
                background:none; border:none; cursor:pointer; font-size:16px; color:var(--muted);
              ">👁️</button>
            </div>
          </div>

          <!-- Demo hint -->
          <div style="
            background:rgba(108,99,255,.07); border:1.5px solid rgba(108,99,255,.18);
            border-radius:10px; padding:11px 14px; margin-bottom:22px;
            font-size:13px; color:var(--text2); display:flex; align-items:center; gap:10px;
          ">
            <span style="font-size:17px;">💡</span>
            Demo: <strong style="color:var(--blue)">admin</strong> &nbsp;/&nbsp; <strong style="color:var(--blue)">1234</strong>
          </div>

          <button type="submit" class="btn btn-primary btn-full" style="font-size:15px; padding:15px;">
            Sign In &nbsp;→
          </button>

        </form>

      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="script.js"></script>
</body>
</html>
